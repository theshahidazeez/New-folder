<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    :root {
      --ink: #17212b;
      --paper: #fffaf1;
      --coral: #ff6b5f;
      --mint: #32d6a1;
      --gold: #ffc857;
      --sky: #5aa9e6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 200, 87, 0.42), transparent 28%),
        radial-gradient(circle at 85% 22%, rgba(50, 214, 161, 0.32), transparent 30%),
        radial-gradient(circle at 70% 85%, rgba(90, 169, 230, 0.36), transparent 34%),
        linear-gradient(135deg, #fffaf1 0%, #eef8ff 52%, #fff2ef 100%);
    }

    .stage {
      position: relative;
      width: min(92vw, 920px);
      min-height: min(78vh, 620px);
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .burst {
      position: absolute;
      inset: 50%;
      width: 560px;
      height: 560px;
      translate: -50% -50%;
      border-radius: 50%;
      background:
        conic-gradient(
          from 20deg,
          var(--coral),
          var(--gold),
          var(--mint),
          var(--sky),
          var(--coral)
        );
      filter: blur(12px);
      opacity: 0.23;
      animation: spin 18s linear infinite;
      z-index: -2;
    }

    .orbit {
      position: absolute;
      inset: 9%;
      border: 2px dashed rgba(23, 33, 43, 0.22);
      border-radius: 999px;
      animation: spin 30s linear infinite reverse;
      z-index: -1;
    }

    .spark {
      position: absolute;
      width: 14px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 26px rgba(255, 107, 95, 0.55);
      animation: float 4s ease-in-out infinite;
    }

    .spark:nth-child(3) {
      top: 13%;
      left: 18%;
      background: var(--gold);
    }

    .spark:nth-child(4) {
      top: 22%;
      right: 13%;
      width: 20px;
      background: var(--mint);
      animation-delay: -1.2s;
    }

    .spark:nth-child(5) {
      bottom: 14%;
      left: 22%;
      width: 18px;
      background: var(--sky);
      animation-delay: -2.1s;
    }

    .spark:nth-child(6) {
      right: 22%;
      bottom: 19%;
      width: 12px;
      animation-delay: -0.7s;
    }

    .hello {
      position: relative;
      width: min(100%, 760px);
      padding: clamp(40px, 7vw, 82px);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow:
        0 28px 80px rgba(23, 33, 43, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(22px);
      text-align: center;
      overflow: hidden;
    }

    .hello::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.74), transparent);
      transform: translateX(-115%);
      animation: shine 5s ease-in-out infinite;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 9px 14px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 10px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 6px rgba(50, 214, 161, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.8rem, 13vw, 9.6rem);
      line-height: 0.9;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h1 span {
      display: inline-block;
      background: linear-gradient(90deg, var(--coral), #c84df0 43%, var(--sky) 74%, var(--mint));
      background-size: 220% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: gradientRun 5s ease-in-out infinite;
    }

    p {
      max-width: 560px;
      margin: 24px auto 0;
      color: rgba(23, 33, 43, 0.74);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      min-height: 48px;
      padding: 0 20px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: var(--ink);
      box-shadow: 0 12px 30px rgba(23, 33, 43, 0.2);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(23, 33, 43, 0.12);
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(23, 33, 43, 0.24);
    }

    @keyframes gradientRun {
      0%, 100% {
        background-position: 0% center;
      }
      50% {
        background-position: 100% center;
      }
    }

    @keyframes shine {
      0%, 48% {
        transform: translateX(-115%);
      }
      78%, 100% {
        transform: translateX(115%);
      }
    }

    @keyframes spin {
      to {
        rotate: 1turn;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-18px) scale(1.15);
      }
    }

    @media (max-width: 620px) {
      .stage {
        min-height: 100vh;
      }

      .hello {
        padding: 36px 22px;
      }

      .button-row {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Fancy Hello World page">
    <div class="burst"></div>
    <div class="orbit"></div>
    <div class="spark"></div>
    <div class="spark"></div>
    <div class="spark"></div>
    <div class="spark"></div>

    <section class="hello">
      <div class="badge">First Program Energy</div>
      <h1><span>Hello</span><br />World</h1>
      <p>
        A tiny page with glass, glow, motion, and a cheerful gradient to make the classic
        greeting feel like it just stepped onto a stage.
      </p>
      <div class="button-row">
        <button class="button" onclick="document.querySelector('h1 span').textContent = 'Hi'">
          Say Hi
        </button>
        <button class="button secondary" onclick="document.querySelector('h1 span').textContent = 'Hello'">
          Reset
        </button>
      </div>
    </section>
  </main>
</body>
</html>
