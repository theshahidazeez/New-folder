<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Shahid Azeez</title>
  <style>
    :root {
      --ink: #17212b;
      --coral: #ff6b5f;
      --mint: #32d6a1;
      --gold: #ffc857;
      --sky: #5aa9e6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 200, 87, 0.42), transparent 28%),
        radial-gradient(circle at 85% 22%, rgba(50, 214, 161, 0.32), transparent 30%),
        radial-gradient(circle at 70% 85%, rgba(90, 169, 230, 0.36), transparent 34%),
        linear-gradient(135deg, #fffaf1 0%, #eef8ff 52%, #fff2ef 100%);
    }

    .nav {
      position: fixed;
      top: 22px;
      left: 50%;
      z-index: 10;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 16px 40px rgba(23, 33, 43, 0.12);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    .nav a {
      padding: 10px 15px;
      border-radius: 999px;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 800;
      text-decoration: none;
      transition: background 180ms ease, transform 180ms ease;
    }

    .nav a:hover,
    .nav a.active {
      background: var(--ink);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .page {
      position: relative;
      width: min(92vw, 980px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 120px 0 56px;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: conic-gradient(from 35deg, var(--coral), var(--gold), var(--mint), var(--sky), var(--coral));
      filter: blur(18px);
      opacity: 0.2;
      transform: translate(-50%, -50%);
      animation: spin 20s linear infinite;
      z-index: -1;
    }

    .contact {
      width: min(100%, 900px);
      display: grid;
      gap: 26px;
      grid-template-columns: minmax(0, 0.95fr) minmax(300px, 1.05fr);
      align-items: stretch;
    }

    .panel,
    .form {
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 28px 80px rgba(23, 33, 43, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(22px);
    }

    .panel {
      padding: clamp(32px, 5vw, 56px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 9px 14px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 10px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 6px rgba(50, 214, 161, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6.3rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    h1 span {
      color: transparent;
      background: linear-gradient(90deg, var(--coral), #c84df0 42%, var(--sky) 72%, var(--mint));
      background-clip: text;
      -webkit-background-clip: text;
      background-size: 220% auto;
      animation: gradientRun 5s ease-in-out infinite;
    }

    p {
      margin: 22px 0 0;
      color: rgba(23, 33, 43, 0.74);
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.75;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .links a {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      border: 1px solid rgba(23, 33, 43, 0.12);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.52);
      font-weight: 800;
      text-decoration: none;
    }

    .form {
      display: grid;
      gap: 16px;
      padding: clamp(26px, 5vw, 42px);
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 800;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(23, 33, 43, 0.14);
      border-radius: 8px;
      padding: 14px 15px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      font: inherit;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 4px rgba(90, 169, 230, 0.2);
    }

    button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: var(--ink);
      box-shadow: 0 12px 30px rgba(23, 33, 43, 0.2);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(23, 33, 43, 0.24);
    }

    @keyframes gradientRun {
      0%, 100% {
        background-position: 0% center;
      }
      50% {
        background-position: 100% center;
      }
    }

    @keyframes spin {
      to {
        rotate: 1turn;
      }
    }

    @media (max-width: 760px) {
      .contact {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="nav" aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a class="active" href="contact.html">Contact</a>
  </nav>

  <main class="page">
    <div class="glow"></div>
    <section class="contact" aria-label="Contact Shahid Azeez">
      <div class="panel">
        <div class="badge">Contact</div>
        <h1>Say <span>Hello</span></h1>
        <p>
          Have an idea, question, or message? Use this page as a polished contact
          space for reaching Shahid Azeez.
        </p>
        <div class="links">
          <a href="mailto:hello@example.com"><span>Email</span><span>hello@example.com</span></a>
          <a href="tel:+910000000000"><span>Phone</span><span>+91 00000 00000</span></a>
        </div>
      </div>

      <form class="form" action="mailto:hello@example.com" method="post" enctype="text/plain">
        <label>
          Your Name
          <input type="text" name="name" placeholder="Enter your name" required />
        </label>
        <label>
          Email Address
          <input type="email" name="email" placeholder="Enter your email" required />
        </label>
        <label>
          Message
          <textarea name="message" placeholder="Write your message" required></textarea>
        </label>
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
